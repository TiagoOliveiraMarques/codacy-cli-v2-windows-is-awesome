name: node
description: Node.js JavaScript runtime
default_version: "22.2.0"
download:
  url_template: "https://nodejs.org/dist/v{{.Version}}/{{.FileName}}.{{.Extension}}"
  file_name_template: "node-v{{.Version}}-{{.OS}}-{{.Arch}}"
  extension:
    windows: "zip"
    default: "tar.gz"
  arch_mapping:
    "386": "x86"
    "amd64": "x64"
    "arm": "armv7l"
    "arm64": "arm64"
  os_mapping:
    "windows": "win"
binaries:
  - name: node
    path: 
      darwin: "bin/node"
      linux: "bin/node"
      windows: "node"
  - name: npm
    path: 
      linux: "bin/npm"
      darwin: "bin/npm"
      windows: "npm"